<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Угадай число PRO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1> Угадай число</h1>

  <input type="text" id="playerName" placeholder="Ваше имя">

  <select id="difficulty">
    <option value="50">Легко (1–50)</option>
    <option value="100" selected>Нормально (1–100)</option>
    <option value="1000">Сложно (1–1000)</option>
  </select>

  <button onclick="startGame()">Начать игру</button>

  <div id="gameArea" class="hidden">
    <p id="message"></p>
    <p>⏱ Время: <span id="timer">0</span> сек</p>

    <input type="number" id="guessInput" placeholder="Введите число">
    <button onclick="checkGuess()">Проверить</button>
    <button onclick="newGame()">Новая игра</button>
  </div>

  <h2> Рекорды</h2>
  <ul id="leaderboard"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
